name: Feature request
description: Suggest an idea or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: dropdown
    id: surface
    attributes:
      label: Product surface
      description: Where should this improvement land?
      options:
        - "RealmLab desktop app"
        - "Installer or update flow"
        - "Local agent/runtime"
        - "Documentation"
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: What are you trying to do, and what gets in the way today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: false
