name: Bug report
description: Report a bug in RealmLab
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please include the RealmLab version and the
        platform where you saw the issue.
  - type: dropdown
    id: surface
    attributes:
      label: Product surface
      description: Where did this happen?
      options:
        - "RealmLab desktop app"
        - "Installer or update flow"
        - "Local agent/runtime"
        - "Documentation"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Exact version
      description: RealmLab version or commit.
      placeholder: e.g. v0.1.0
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS / platform
      placeholder: e.g. macOS 15.3 (arm64), Ubuntu 24.04, Windows 11
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or output
      description: Paste any error output. Automatically formatted as code.
      render: shell
    validations:
      required: false
